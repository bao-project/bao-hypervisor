name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  
  coding-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: ./.github/actions/bao-container-run
        with:
          run: make format-check
